grpc:
  server:
    port: -1

spring:
  datasource:
    url: jdbc:tc:postgresql:16:///testdb
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    url: jdbc:tc:postgresql:16:///testdb
    password: test
    user: test
    change-log: classpath:/migrations/master.xml

  cache:
    type: redis

  data:
    redis:
      host: localhost
      port: 0

  jpa:
    hibernate:
      ddl-auto: validate

app:
  kafka:
    replicas: 1
    partitions: 1

  access-type: SQL

  cache:
    ttl: 1

  bot:
    base-url: http://localhost:9999
    grpc:
      host: localhost
      port: 9999

  github:
    base-url: http://localhost:8100
    token: test
  stackoverflow:
    base-url: http://localhost:8101
    key: test
    access-token: test
debug: false
