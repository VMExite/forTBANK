grpc:
  server:
    port: -1

spring:
    datasource:
      url: jdbc:tc:postgresql:16:///testdb
      username: test
      password: test
      driver-class-name: org.postgresql.Driver
    liquibase:
      enabled: true
      change-log: classpath:/migrations/master.xml
      url: jdbc:tc:postgresql:16:///testdb
      user: test
      password: test

    kafka:
      producer:
        key-serializer: org.apache.kafka.common.serialization.LongSerializer
        value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      admin:
        properties:
          default.replication.factor: 1


    jpa:
      hibernate:
        ddl-auto: validate


app:
  kafka:
    replicas: 1
    partitions: 1
  bot:
    base-url: http://localhost:9999
    grpc:
      host: localhost
      port: 9999

  github:
    base-url: http://localhost:8100
    token: test
  stackoverflow:
    base-url: http://localhost:8101
    key: test
    access-token: test
