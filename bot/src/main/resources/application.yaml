server:
  port: 8080

spring:
  application:
    name: bot
  config:
    import: file:.env[.properties]
  messages:
    encoding: UTF-8

app:
  telegram:
    url: https://api.telegram.org/bot
    token: ${TELEGRAM_TOKEN} # Use env variable. DO NOT KEEP TOKEN HERE
    update-listener-sleep: 1s
    debug: false
  message:
    basename: classpath:messages


logging:
  level:
    root: info
  structured:
    format:
      console: ecs
