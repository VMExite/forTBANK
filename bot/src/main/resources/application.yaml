server:
  port: 8080
grpc:
  server:
    port: 9091

spring:
  application:
    name: bot
  config:
    import: optional:file:.env[.properties]
  messages:
    encoding: UTF-8

app:
  telegram:
    url: https://api.telegram.org/bot
    token: ${TELEGRAM_TOKEN} # Use env variable. DO NOT KEEP TOKEN HERE
    update-listener-sleep: 1s
    debug: false
  message:
    basename: classpath:messages
  scrapper:
    base-url: "http://localhost:8081"
    grpc:
      host: "localhost"
      port: 9093


logging:
  level:
    root: info
  structured:
    format:
#      console: ecs
      file: ecs
  file:
    name: log/log.json
